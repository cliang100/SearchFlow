<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SearchFlow</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <div id="hero">
    <div class="wordmark">Search<span>Flow</span></div>
    <div class="search-wrap">
      <input
        id="search-input"
        type="text"
        placeholder="search the index..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-btn" id="search-btn" aria-label="Search">⏎</button>
      <div id="autocomplete"></div>
    </div>
  </div>

  <div id="results-section">
    <div id="meta"></div>
    <div id="results-list"></div>
    <div id="status"></div>
  </div>

  <div id="admin-bar">
    <button class="admin-btn" id="rebuild-btn">rebuild index</button>
    <button class="admin-btn" id="crawl-btn">crawl url</button>
  </div>

  <div id="toast"></div>

  <script src="/static/js/main.js"></script>
</body>
</html>
